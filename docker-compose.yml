# Orquestra o servidor de tracking do MLflow + o serviço de treino.
# Ambos usam a MESMA imagem do projeto (mlflow já está nas deps) — sem baixar
# imagem externa e com versão garantidamente idêntica entre cliente e servidor.
services:
  mlflow:
    # `target: runtime` explícito: o default (último stage) passou a ser o
    # serving-local, que não contém DVC — os serviços batch usam o runtime.
    build:
      context: .
      target: runtime
    # Backend SQLite (necessário para o Model Registry da Etapa 4) + artefatos
    # em volume persistente (estado crítico nunca na camada efêmera).
    user: root
    # --serve-artifacts: clientes logam artefatos via proxy HTTP (mlflow-artifacts:/),
    # sem precisar de acesso ao filesystem do servidor — necessário para o serviço
    # `train` (e para `dvc repro` local apontando ao compose) conseguir logar modelos.
    command:
      - mlflow
      - server
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --artifacts-destination
      - /mlflow/artifacts
      - --serve-artifacts
      - --host
      - 0.0.0.0
      - --port
      - "5000"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; urllib.request.urlopen('http://localhost:5000/health'); sys.exit(0)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  train:
    build:
      context: .
      target: runtime
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    # Imagem autocontida (dados/modelos gerados dentro do container, efêmeros);
    # os runs/params/métricas persistem no servidor MLflow (volume mlflow_data).
    # `core.no_scm` (apenas no container, via --local) permite `dvc repro` sem git.
    command: ["sh", "-c", "dvc config core.no_scm true --local && dvc repro"]

  api:
    build:
      context: .
      target: serving
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    # O primário vem do Registry, mas o fallback de popularidade é lido do disco
    # (models/baseline.pkl) — output do `dvc repro`, montado somente leitura.
    volumes:
      - ./models:/app/models:ro
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ./grafana-prometheus/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./grafana-prometheus/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana-prometheus/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  mlflow_data:
