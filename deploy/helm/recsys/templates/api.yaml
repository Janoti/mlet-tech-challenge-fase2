apiVersion: apps/v1
kind: Deployment
metadata:
  name: recsys-api
  labels:
    app: recsys-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: recsys-api
  template:
    metadata:
      labels:
        app: recsys-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: MODEL_SOURCE
              value: {{ .Values.api.modelSource | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: recsys-api
  labels:
    app: recsys-api
spec:
  selector:
    app: recsys-api
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: recsys-api
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: "api.{{ .Values.ingress.baseHost }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: recsys-api
                port:
                  number: {{ .Values.api.port }}
