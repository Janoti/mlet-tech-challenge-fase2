# ============================================================================
# Segurança — scan de vulnerabilidades da imagem Docker com Trivy.
# Builda a imagem e falha o PR se houver CVE CRITICAL/HIGH com correção
# disponível (supply-chain security desde o build).
# ============================================================================
name: Security (Trivy)

on:
  pull_request:
    branches: [main]

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Trivy image scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem
        run: docker build -t recsys:ci .

      - name: Instalar Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Scan Trivy (falha em CRITICAL/HIGH com fix)
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format table \
            recsys:ci
